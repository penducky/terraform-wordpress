name: Terraform Apply/Destroy
on:
 workflow_dispatch:
    inputs:
        action:
            required: true
            default: 'apply'
            type: choice
            options:
                - apply
                - destroy


jobs:
 terraform_apply:
   if: github.event.inputs.action == 'apply'
   runs-on: ubuntu-latest
   
   env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      
   steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.6
         
      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Format
        id: fmt
        run: terraform fmt

      - name: Terraform Validate
        id: validate
        run: terraform validate
        
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -var db_password=${{secrets.DB_PASSWORD}} -var db_username=${{secrets.DB_USERNAME}} -out tfplan

      - name: Terraform Apply
        id: apply
        run: terraform apply "tfplan"

 terraform_destroy:
    if: github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.6

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Format
        id: fmt
        run: terraform fmt

      - name: Terraform Validate
        id: validate
        run: terraform validate
        
      - name: Terraform Destroy
        id: destroy
        run: terraform destroy -auto-approve -var db_password=${{secrets.DB_PASSWORD}} -var db_username=${{secrets.DB_USERNAME}}
